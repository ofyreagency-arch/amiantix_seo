[program:praeviseo-frontend]
process_name=%(program_name)s
directory=/var/www/seo-engine/frontend
environment=PRAEVISEO_API_URL="https://seo.amiantix.com",NEXT_PUBLIC_API_URL="https://seo.amiantix.com",NODE_ENV="production",PORT="3000"
command=/usr/bin/node /var/www/seo-engine/frontend/node_modules/next/dist/bin/next start --hostname 127.0.0.1 --port 3000
autostart=true
autorestart=true
startsecs=5
stopsignal=TERM
stopasgroup=true
killasgroup=true
stopwaitsecs=30
user=root
redirect_stderr=true
stdout_logfile=/var/log/supervisor/praeviseo-frontend.log
